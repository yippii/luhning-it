name: Build executable with Nuitka
on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Github Checkout
        uses: actions/checkout@v6

      - name: Setting Up Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - run: pip install -r requirements.txt

      - name: Compile with Nuitka
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: customer-system.py
          mode: app
          include-module: pygame.mixer
          enable-plugins: tk-inter
          include-data-files: '*.csv=postal_codes.csv'
          output-dir: .
          output-file: customer-system
          macos-app-name: "Customer System"
          
      - name: Uploading artifact
        uses: actions/upload-artifact@v7
        with:
          name: Application Executable - ${{matrix.os}}
          path: | 
            ${{ matrix.os == 'windows-latest' && '*.exe' || matrix.os == 'ubuntu-latest' && 'customer-system' || matrix.os == 'macos-latest' && '*.app' }}